<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 760" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a342c"/>
      <stop offset="1" stop-color="#5a4f3e"/>
    </linearGradient>
    <linearGradient id="atrio" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a1410"/>
      <stop offset="1" stop-color="#7a2a1c"/>
    </linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#e6c36a"/>
    </marker>
    <marker id="arrowR" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#d96a4a"/>
    </marker>
  </defs>

  <style>
    .bg{fill:#15120f}
    .lvl{fill:#221d18;stroke:#3a322a;stroke-width:1}
    .lvltag{fill:#9aa090;font-size:13px;font-weight:bold;letter-spacing:1px}
    .zone{fill:#2c2620;stroke:#52483a;stroke-width:1.5;rx:5}
    .arena{fill:#3a2a18;stroke:#c8732a;stroke-width:2;rx:5}
    .zt{fill:#d7e8d0;font-size:13px}
    .ztb{fill:#e6c36a;font-size:13px;font-weight:bold}
    .tag{fill:#c8732a;font-size:10px;font-weight:bold;letter-spacing:1px}
    .note{fill:#8a8f80;font-size:10.5px}
    .title{fill:#e6c36a;font-size:22px;font-weight:bold;letter-spacing:2px}
    .sub{fill:#9aa090;font-size:12px}
    .ramp{stroke:#6f8f5a;stroke-width:3;fill:none}
    .lift{stroke:#5a8fb0;stroke-width:3;fill:none}
    .routeN{fill:#15120f;stroke:#e6c36a;stroke-width:2}
    .routeT{fill:#e6c36a;font-size:13px;font-weight:bold}
    .legt{fill:#c9cfc0;font-size:12px}
  </style>

  <rect class="bg" x="0" y="0" width="1000" height="760"/>

  <!-- Title -->
  <text class="title" x="40" y="44">LA FUNDICIÓN</text>
  <text class="sub" x="40" y="64">Corte vertical · 3 estratos + Atrio del Horno · ~120×120 m · recorrido A→F</text>

  <!-- ===== SUPERFICIE / DUNAS ===== -->
  <rect x="40" y="82" width="800" height="78" fill="url(#sky)" stroke="#5a4f3e"/>
  <text class="lvltag" x="48" y="100">LA TRAVESÍA — dunas (exterior)</text>
  <!-- chimney landmark -->
  <rect x="690" y="40" width="26" height="120" fill="#2a2018" stroke="#52483a"/>
  <text class="note" x="660" y="36">chimenea del Horno (landmark)</text>
  <!-- start + secret -->
  <circle cx="95" cy="130" r="6" fill="#7fd0ff"/>
  <text class="note" x="78" y="152">inicio jugador</text>
  <text class="note" x="250" y="118">★ Secreto 1: el corazón en la duna (~200 m)</text>

  <!-- ===== N1 SUPERFICIE ===== -->
  <rect class="lvl" x="40" y="170" width="800" height="150"/>
  <text class="lvltag" x="48" y="190">N1 · SUPERFICIE</text>
  <rect class="zone" x="60" y="205" width="220" height="95" rx="5"/>
  <text class="zt" x="74" y="245">Entrada</text><text class="zt" x="74" y="263">Colapsada</text>
  <rect class="arena" x="300" y="205" width="240" height="95" rx="5"/>
  <text class="tag" x="314" y="226">ARENA 1</text>
  <text class="ztb" x="314" y="252">Patio de Carga</text>
  <text class="note" x="314" y="272">portón que abre la oleada</text>
  <rect class="zone" x="560" y="205" width="260" height="95" rx="5"/>
  <text class="zt" x="574" y="245">Plataforma de Carga</text>
  <text class="note" x="574" y="265">★3 azotea contenedores (parkour)</text>

  <!-- ===== N0 PLANTA ===== -->
  <rect class="lvl" x="40" y="330" width="800" height="150"/>
  <text class="lvltag" x="48" y="350">N0 · PLANTA</text>
  <rect class="arena" x="60" y="365" width="220" height="95" rx="5"/>
  <text class="tag" x="74" y="386">ARENA</text>
  <text class="ztb" x="74" y="412">Sala de Turbinas</text>
  <rect class="zone" x="300" y="365" width="240" height="95" rx="5"/>
  <text class="zt" x="314" y="412">Galería de Cintas</text>
  <text class="note" x="314" y="432">cinta empuja (mecanismo)</text>
  <rect class="zone" x="560" y="365" width="260" height="95" rx="5"/>
  <text class="zt" x="574" y="405">Sala de Control</text>
  <text class="tag" x="574" y="426">● BOTÓN → compuerta</text>

  <!-- ===== N-1 SUBSUELO ===== -->
  <rect class="lvl" x="40" y="490" width="800" height="150"/>
  <text class="lvltag" x="48" y="510">N−1 · SUBSUELO</text>
  <rect class="zone" x="60" y="525" width="220" height="95" rx="5" fill="#1c1813"/>
  <text class="zt" x="74" y="565">Túneles</text>
  <text class="note" x="74" y="585">a oscuras · generador</text>
  <rect class="zone" x="300" y="525" width="240" height="95" rx="5" fill="#16242b"/>
  <text class="zt" x="314" y="565">Depósito Inundado</text>
  <text class="note" x="314" y="585">agua · buceo (★6)</text>
  <rect class="arena" x="560" y="525" width="260" height="95" rx="5"/>
  <text class="tag" x="574" y="546">CLÍMAX</text>
  <text class="ztb" x="574" y="572">Cámara del Núcleo</text>
  <text class="note" x="574" y="592">horda final · ★7 barriles</text>

  <!-- ===== ATRIO (pozo vertical) ===== -->
  <rect x="860" y="170" width="100" height="470" fill="url(#atrio)" stroke="#7a2a1c" stroke-width="2"/>
  <text class="ztb" x="910" y="410" transform="rotate(90 910 410)" text-anchor="middle">ATRIO DEL HORNO — pozo central</text>
  <text class="note" x="868" y="190">balcones</text>
  <text class="note" x="868" y="632">mega-arena (hub)</text>

  <!-- ===== CONEXIONES ===== -->
  <!-- rampas entre niveles (la IA las usa) -->
  <line class="ramp" x1="170" y1="300" x2="120" y2="365"/>
  <line class="ramp" x1="420" y1="460" x2="370" y2="525"/>
  <text class="note" x="120" y="335" fill="#6f8f5a">rampa (IA)</text>
  <text class="note" x="360" y="495" fill="#6f8f5a">rampa (IA)</text>
  <!-- montacargas (solo jugador) -->
  <line class="lift" x1="690" y1="300" x2="690" y2="365" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text class="note" x="700" y="338" fill="#5a8fb0">montacargas</text>
  <text class="note" x="700" y="352" fill="#5a8fb0">(solo jugador)</text>

  <!-- ===== RUTA A→F ===== -->
  <polyline points="95,130 410,252 660,405 170,572 660,572" fill="none" stroke="#e6c36a" stroke-width="2" stroke-dasharray="2 5" opacity="0.6"/>
  <!-- F: huida en reversa (sube de vuelta) -->
  <path d="M660,548 C 900,470 980,300 200,120" fill="none" stroke="#d96a4a" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrowR)"/>
  <text class="note" x="500" y="690" fill="#d96a4a">F · HUIDA CON COLAPSO: correr el mapa EN REVERSA hasta las dunas →</text>

  <g font-family="Segoe UI, Arial">
    <circle class="routeN" cx="95" cy="130" r="13"/><text class="routeT" x="95" y="135" text-anchor="middle">A</text>
    <circle class="routeN" cx="410" cy="252" r="13"/><text class="routeT" x="410" y="257" text-anchor="middle">B</text>
    <circle class="routeN" cx="660" cy="405" r="13"/><text class="routeT" x="660" y="410" text-anchor="middle">C</text>
    <circle class="routeN" cx="170" cy="572" r="13"/><text class="routeT" x="170" y="577" text-anchor="middle">D</text>
    <circle class="routeN" cx="660" cy="572" r="13"/><text class="routeT" x="660" y="577" text-anchor="middle">E</text>
  </g>

  <!-- ===== LEYENDA ===== -->
  <text class="lvltag" x="40" y="712">LEYENDA</text>
  <rect class="arena" x="40" y="722" width="22" height="16"/><text class="legt" x="68" y="735">Arena (oleada)</text>
  <rect width="22" height="16" x="190" y="722" fill="url(#atrio)" stroke="#7a2a1c"/><text class="legt" x="218" y="735">Atrio / Horno</text>
  <line class="ramp" x1="330" y1="730" x2="360" y2="730"/><text class="legt" x="366" y="735">Rampa (IA)</text>
  <line class="lift" x1="470" y1="730" x2="500" y2="730"/><text class="legt" x="506" y="735">Montacargas</text>
  <circle class="routeN" cx="620" cy="730" r="9"/><text class="legt" x="636" y="735">Recorrido A→F</text>
  <text class="legt" x="770" y="735" fill="#8a8f80">★ = secreto (12 total)</text>
</svg>
